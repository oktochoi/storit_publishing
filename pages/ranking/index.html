<!DOCTYPE html>
<html lang="ko">
  <head>
    <script src="../../js/storit-paths.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일간 랭킹</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/ranking-common.css" />
    <link rel="stylesheet" href="../../css/ranking.css" />
  </head>
  <body>
    <main class="ranking-app">
      <header class="ranking-header">
        <a class="ranking-header__back" href="../../pages/main/index.html" aria-label="뒤로 가기">
          <img src="../../assets/icons/icon-back.svg" alt="" />
        </a>
        <h1 class="ranking-header__title">일간 랭킹</h1>
      </header>

      <div class="ranking-body">
        <div class="ranking-scroll">
          <section class="ranking-hero" aria-label="일간 랭킹 안내">
            <img class="ranking-hero__banner" src="../../assets/images/ranking/hero-banner.svg" alt="" />
            <div class="ranking-hero__live">
              <img src="../../assets/images/ranking/live.svg" alt="" />
              <span>LIVE</span>
            </div>
            <p class="ranking-hero__desc">일간 랭킹은 오늘 본 웹툰 퀴즈의 총점의 합으로 경쟁합니다.</p>
            <div class="ranking-hero__rewards">
              <div class="ranking-hero__reward-col">
                <img class="icon" src="../../assets/images/ranking/medal-gold.svg" alt="" />
                <span class="ranking-hero__reward-label">1등</span>
                <div class="ranking-hero__reward-value">
                  <img src="../../assets/images/ranking/cookie-chip.svg" alt="" />
                  <strong>50</strong>
                </div>
              </div>
              <img class="ranking-hero__divider" src="../../assets/images/ranking/divider-v.svg" alt="" />
              <div class="ranking-hero__reward-col">
                <img class="icon icon--clover" src="../../assets/images/ranking/clover.svg" alt="" />
                <span class="ranking-hero__reward-label">행운의 등수</span>
                <div class="ranking-hero__reward-value">
                  <img src="../../assets/images/ranking/cookie-chip.svg" alt="" />
                  <strong>20</strong>
                </div>
              </div>
              <img class="ranking-hero__divider" src="../../assets/images/ranking/divider-v.svg" alt="" />
              <div class="ranking-hero__reward-col">
                <img class="icon icon--top30" src="../../assets/images/ranking/medal-top30.svg" alt="" />
                <span class="ranking-hero__reward-label">TOP 30</span>
                <div class="ranking-hero__reward-value">
                  <img src="../../assets/images/ranking/cookie-chip.svg" alt="" />
                  <strong>1</strong>
                </div>
              </div>
            </div>
            <div class="ranking-hero__timer">
              <img src="../../assets/images/ranking/clock.svg" alt="" />
              <span>자정까지 남은 시간</span>
              <strong>03:41:29</strong>
            </div>
          </section>

          <section class="ranking-my-card" aria-label="내 순위">
            <a class="ranking-my-card__profile" href="../../pages/ranking/announce.html">
              <img class="ranking-my-card__badge" src="../../assets/images/ranking/rank-badge.svg" alt="" />
              <p class="ranking-my-card__label">내 순위</p>
              <p class="ranking-my-card__rank">32<em>위</em></p>
              <div class="ranking-my-card__trend">
                <img src="../../assets/images/ranking/trend-up.svg" alt="상승" />
                <span>1</span>
              </div>
              <div class="ranking-my-card__score-row">
                <span>내 점수</span>
                <span>822점</span>
              </div>
            </a>
            <img class="ranking-my-card__vline" src="../../assets/images/ranking/divider-v.svg" alt="" />
            <div class="ranking-my-card__goal">
              <p class="ranking-my-card__goal-label">TOP 30 진입까지</p>
              <p class="ranking-my-card__goal-value">
                +<span class="ranking-my-card__goal-num">42</span
                ><span class="ranking-my-card__goal-text">점 필요</span>
              </p>
            </div>
            <a class="ranking-my-card__quiz-btn" href="../../pages/main/index.html">퀴즈<br />풀기</a>
          </section>

          <section class="ranking-board" aria-label="순위표">
            <div class="ranking-tabs" role="tablist">
              <a class="ranking-tabs__item ranking-tabs__item--active" href="../../pages/ranking/index.html" role="tab" aria-selected="true">일간 랭킹</a>
              <a class="ranking-tabs__item" href="../../pages/ranking/season.html" role="tab" aria-selected="false">시즌 랭킹</a>
            </div>

            <div class="ranking-table-head" aria-hidden="true">
              <span class="ranking-table-head__rank">순위</span>
              <span class="ranking-table-head__name">닉네임</span>
              <span class="ranking-table-head__score">오늘 점수</span>
              <span class="ranking-table-head__change">순위변동</span>
            </div>

            <div class="ranking-row ranking-row--gold">
              <img class="ranking-row__medal" src="../../assets/images/ranking/1.svg" alt="1위" />
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="../../assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">무케대마왕</span>
              </div>
              <span class="ranking-row__score">850점</span>
              <div class="ranking-row__change">
                <img src="../../assets/images/ranking/trend-up.svg" alt="" />
                <span>1</span>
              </div>
            </div>

            <div class="ranking-row ranking-row--silver">
              <img class="ranking-row__medal" src="../../assets/images/ranking/medal-2nd.svg" alt="2위" />
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="../../assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">웹툰도하</span>
              </div>
              <span class="ranking-row__score">850점</span>
              <div class="ranking-row__change">
                <img src="../../assets/images/ranking/trend-down.svg" alt="" />
                <span>1</span>
              </div>
            </div>

            <div class="ranking-row ranking-row--bronze">
              <img class="ranking-row__medal" src="../../assets/images/ranking/3.svg" alt="3위" />
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="../../assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">격삼추가좀</span>
              </div>
              <span class="ranking-row__score">850점</span>
              <div class="ranking-row__change">
                <span class="ranking-row__change-icon" aria-hidden="true"></span>
                <img class="ranking-row__change-dash" src="../../assets/images/ranking/change-dash.svg" alt="" />
              </div>
            </div>

            <div class="ranking-gap" aria-hidden="true">
              <img src="../../assets/images/ranking/gap-ellipsis.svg" alt="" />
            </div>

            <div class="ranking-row ranking-row--me">
              <span class="ranking-row__rank-num">7</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="../../assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">내가그린기린그림</span>
              </div>
              <span class="ranking-row__score">850점</span>
              <div class="ranking-row__change">
                <span class="ranking-row__change-icon" aria-hidden="true"></span>
                <img class="ranking-row__change-dash" src="../../assets/images/ranking/change-dash.svg" alt="" />
              </div>
            </div>

            <div class="ranking-gap" aria-hidden="true">
              <img src="../../assets/images/ranking/gap-ellipsis.svg" alt="" />
            </div>

            <div class="ranking-row">
              <span class="ranking-row__rank-num">92</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="../../assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">별빛의수호자</span>
              </div>
              <span class="ranking-row__score">850점</span>
              <div class="ranking-row__change">
                <span class="ranking-row__change-icon" aria-hidden="true"></span>
                <img class="ranking-row__change-dash" src="../../assets/images/ranking/change-dash.svg" alt="" />
              </div>
            </div>
          </section>
        </div>

        <aside class="ranking-sticky-lucky" aria-label="오늘의 행운 구간">
          <div class="ranking-lucky">
            <div class="ranking-lucky__inner">
              <div class="ranking-lucky__head">
                <img class="ranking-lucky__illus" src="../../assets/images/ranking/lucky-zone.svg" alt="" />
                <div class="ranking-lucky__copy">
                  <strong>오늘의 행운 구간</strong>
                  <p class="ranking-lucky__range">
                    <span class="ranking-lucky__range-num">10</span><span class="ranking-lucky__range-label">위 ~</span><span class="ranking-lucky__range-num">30</span><span class="ranking-lucky__range-label">위 사이</span>
                  </p>
                  <p class="ranking-lucky__hint">시간이 지날수록 좁혀져요!</p>
                </div>
              </div>
              <div class="ranking-lucky__bar-wrap">
                <img class="ranking-lucky__pin" src="../../assets/images/ranking/pin.svg" alt="" />
                <div class="ranking-lucky__track"></div>
                <div class="ranking-lucky__fill"></div>
                <span class="ranking-lucky__marker ranking-lucky__marker--start"></span>
                <span class="ranking-lucky__marker ranking-lucky__marker--end"></span>
                <div class="ranking-lucky__scale">
                  <span>1</span>
                  <span>10</span>
                  <span>30</span>
                  <span>100+</span>
                </div>
              </div>
            </div>
          </div>
        </aside>

        <div class="ranking-wave-bar" aria-hidden="true">
          <img class="ranking-wave-bar__bg" src="../../assets/images/common/wave-bottom.svg" alt="" />
        </div>
      </div>
    </main>
    <script src="../../js/ranking.js"></script>
  </body>
</html>
