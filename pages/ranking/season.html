<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시즌 랭킹</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/ranking-common.css" />
    <link rel="stylesheet" href="../../css/ranking.css" />
  </head>
  <body>
    <main class="ranking-app">
      <header class="ranking-header">
        <a class="ranking-header__back" href="/pages/main/index.html" aria-label="뒤로 가기">
          <img src="/assets/icons/icon-back.svg" alt="" />
        </a>
        <h1 class="ranking-header__title">시즌 랭킹</h1>
      </header>

      <div class="ranking-body">
        <div class="ranking-scroll">
          <section class="ranking-season-hero" aria-label="시즌 안내">
            <img class="ranking-season-hero__bg" src="/assets/images/ranking/season-mission-bg.png" alt="" />
            <p class="ranking-season-hero__tag">SEASON 04</p>
            <p class="ranking-season-hero__title">이번 달 누적 점수로<br />순위가 결정돼요!</p>
            <div class="ranking-season-hero__timer">
              <img src="/assets/images/ranking/clock.svg" alt="" />
              <span>시즌 종료까지 남은 시간</span>
              <strong>5일 03:41:29</strong>
            </div>
            <img class="ranking-season-hero__cookie" src="/assets/images/ranking/season-mission-cookie.svg" alt="" />
          </section>

          <div class="ranking-podium3" aria-label="시즌 TOP3">
            <article class="ranking-podium3__item ranking-podium3__item--side">
              <div class="ranking-podium3__card">
                <p class="ranking-podium3__rank">2위</p>
                <span class="ranking-avatar ranking-avatar--lg"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <p class="ranking-podium3__name">무협대마왕</p>
                <div class="ranking-podium3__score">
                  <img src="/assets/images/ranking/score-icon.svg" alt="" />
                  <span>22,680</span>
                </div>
              </div>
            </article>
            <article class="ranking-podium3__item ranking-podium3__item--center">
              <img class="ranking-podium3__medal" src="/assets/images/ranking/medal-gold.svg" alt="" />
              <div class="ranking-podium3__card">
                <p class="ranking-podium3__rank">1위</p>
                <span class="ranking-avatar ranking-avatar--lg"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <p class="ranking-podium3__name">판타지마왕</p>
                <div class="ranking-podium3__score">
                  <img src="/assets/images/ranking/score-icon.svg" alt="" />
                  <span>22,680</span>
                </div>
              </div>
            </article>
            <article class="ranking-podium3__item ranking-podium3__item--side">
              <div class="ranking-podium3__card">
                <p class="ranking-podium3__rank">3위</p>
                <span class="ranking-avatar ranking-avatar--lg"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <p class="ranking-podium3__name">호랑이마왕</p>
                <div class="ranking-podium3__score">
                  <img src="/assets/images/ranking/score-icon.svg" alt="" />
                  <span>22,680</span>
                </div>
              </div>
            </article>
          </div>

          <section class="ranking-board ranking-season-board" aria-label="시즌 순위">
            <div class="ranking-tabs" role="tablist">
              <a class="ranking-tabs__item" href="/pages/ranking/index.html" role="tab" aria-selected="false">일간 랭킹</a>
              <a class="ranking-tabs__item ranking-tabs__item--active" href="/pages/ranking/season.html" role="tab" aria-selected="true">시즌 랭킹</a>
            </div>


            <div class="ranking-row">
              <span class="ranking-row__rank-num">4</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">무케대마왕</span>
              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />
                22,110
              </span>
            </div>
            <div class="ranking-row ranking-row--me">
              <span class="ranking-row__rank-num">5</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>

              <span class="ranking-row__score">

              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />
                17,954

            </div>
            <div class="ranking-row">
              <span class="ranking-row__rank-num">8</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">달빛요정</span>
              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />
                17,420
              </span>
            </div>
            <div class="ranking-row">
              <span class="ranking-row__rank-num">9</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">초코러버</span>
              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />
                16,880
              </span>
            </div>
            <div class="ranking-row">
              <span class="ranking-row__rank-num">10</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">바람의검</span>
              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />

            <div class="ranking-row">
              <span class="ranking-row__rank-num">11</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">퀴즈마스터</span>
              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />
                15,640
              </span>
            </div>
            <div class="ranking-row">
              <span class="ranking-row__rank-num">12</span>
              <div class="ranking-row__user">
                <span class="ranking-avatar"><img src="/assets/images/ranking/avatar-head.svg" alt="" /></span>
                <span class="ranking-row__name">스토릿팬</span>
              </div>
              <span class="ranking-row__score">
                <img src="/assets/images/ranking/score-icon.svg" alt="" />

            </div>
          </section>
        </div>

        <div class="ranking-wave-bar" aria-hidden="true">
          <img class="ranking-wave-bar__bg" src="/assets/images/common/wave-bottom.svg" alt="" />
        </div>
