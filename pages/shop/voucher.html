<!DOCTYPE html>
<html lang="ko">
  <head>
    <script src="../../js/storit-paths.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품권 상세</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/shop-common.css" />
    <link rel="stylesheet" href="../../css/shop-pages.css" />
  </head>
  <body>
    <main class="shop-app">
      <header class="shop-header">
        <a class="shop-header__back" href="../../pages/shop/storage.html" aria-label="뒤로 가기">
          <img src="../../assets/icons/icon-back.svg" alt="" />
        </a>
        <h1 class="shop-header__title">상품권 상세</h1>
      </header>

      <div class="shop-body">
        <div class="shop-scroll">
          <div class="shop-product-hero">
            <img class="shop-product-hero__img" src="../../assets/images/shop/product-naverpay.png" alt="" />
            <h2 class="shop-product-hero__title">네이버페이 포인트 5,000P</h2>
          </div>

          <section class="shop-barcode-card">
            <div class="shop-barcode-card__code">
              <img src="../../assets/images/shop/barcode.svg" alt="바코드" />
            </div>
            <p class="shop-barcode-card__num">1234 5678 9101 1112</p>
            <button class="shop-barcode-card__copy" type="button" id="copy-barcode">
              <img src="../../assets/images/shop/icon-copy.svg" alt="" />
              바코드 번호 복사
            </button>
          </section>

          <div class="shop-voucher-detail-table shop-detail-table">
            <div class="shop-detail-row">
              <span>신청일</span>
              <span>2026.05.20 14:30</span>
            </div>
            <div class="shop-detail-row">
              <span>지급일</span>
              <span>2026.05.21 14:30</span>
            </div>
            <div class="shop-detail-row">
              <span>유효기간</span>
              <span><span class="shop-badge-dday">D-28</span> 2026.06.19</span>
            </div>
            <div class="shop-detail-row">
              <span>사용쿠키</span>
              <span>50개</span>
            </div>
          </div>
        </div>

        <footer class="shop-voucher-footer">
          <a class="shop-btn shop-btn--primary" href="../../pages/shop/storage.html">완료</a>
        </footer>

        <div class="shop-wave-bar" aria-hidden="true">
          <img class="shop-wave-bar__bg" src="../../assets/images/common/wave-bottom.svg" alt="" />
        </div>
      </div>
    </main>
    <script src="../../js/shop-voucher.js"></script>
  </body>
</html>
