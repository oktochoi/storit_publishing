<!DOCTYPE html>
<html lang="ko">
  <head>
    <script src="../../js/storit-paths.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쿠키 획득 완료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/plus-cookie.css" />
  </head>
  <body>
    <main class="plus-cookie">
      <img
        class="plus-cookie__bg"
        src="../../assets/images/missions/plus-cookie.svg"
        alt=""
        aria-hidden="true"
      />

      <header class="plus-cookie-header">
        <a class="plus-cookie__back" href="./complete.html" aria-label="뒤로 가기">
          <img src="../../assets/icons/icon-back.svg" alt="" />
        </a>
        <h1 class="plus-cookie-title">쿠키 획득 완료</h1>
      </header>

      <div class="plus-cookie__owned" aria-label="보유 쿠키">
        <p class="plus-cookie__owned-label">보유 쿠키</p>
        <div class="plus-cookie__owned-row">
          <div class="plus-cookie__owned-item">
            <img src="../../assets/images/missions/cookie.svg" alt="" />
            <span class="plus-cookie__owned-count">4</span>
          </div>
          <img
            class="plus-cookie__owned-arrow"
            src="../../assets/images/missions/right.svg"
            alt=""
            aria-hidden="true"
          />
          <div class="plus-cookie__owned-item">
            <img src="../../assets/images/missions/cookie.svg" alt="" />
            <span class="plus-cookie__owned-count plus-cookie__owned-count--after">5</span>
          </div>
        </div>
      </div>

      <a class="plus-cookie__home" href="../../pages/main/index.html">홈으로 가기</a>
    </main>
  </body>
</html>
