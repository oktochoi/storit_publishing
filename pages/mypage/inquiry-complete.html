<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의 완료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/mypage-common.css" />
    <link rel="stylesheet" href="../../css/mypage.css" />
  </head>
  <body>
    <main class="mypage-app">
      <header class="mypage-header">
        <a class="mypage-header__back" href="/pages/mypage/settings.html" aria-label="뒤로 가기">
          <img src="/assets/icons/icon-back.svg" alt="" />
        </a>
        <h1 class="mypage-header__title">이용문의</h1>
      </header>

      <div class="mypage-body">
        <div class="mypage-scroll">
          <section class="mypage-complete">
            <img
              class="mypage-complete__icon"
              src="/assets/images/mypage/inquiry-check.svg"
              alt=""
              width="53"
              height="53"
            />
            <h2>문의 등록이 완료되었습니다!</h2>
            <p>문의 확인 후 이메일로 답변 전송드리겠습니다,</p>
          </section>
        </div>

        <footer class="mypage-footer">
          <a class="mypage-btn mypage-btn--primary" href="/pages/mypage/settings.html">환경설정으로 돌아가기</a>
        </footer>

        <div class="mypage-wave-bar" aria-hidden="true">
          <img class="mypage-wave-bar__bg" src="/assets/images/common/wave-bottom.svg" alt="" />
        </div>
      </div>
    </main>
  </body>
</html>
