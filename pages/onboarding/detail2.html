        <h2 class="detail-heading">스토릿(Storit) 14세 이상 이용약관</h2>

        <div class="detail-scroll">
          <p class="detail-article__text">
            스토릿(Storit)은 관련 법령에 의거하여 만 14세 미만 아동의 개인정보 보호를 위해
            회원가입을 제한하고 있습니다.
          </p>
          <p class="detail-article__text">
            본 서비스는 만 14세 이상인 이용자만 가입 및 이용이 가능합니다. 가입 신청자는 본인의
            연령이 만 14세 이상임을 확인하며, 이에 동의합니다. 만약 만 14세 미만의 아동이 타인의
            명의를 도용하는 등 허위로 가입한 사실이 확인될 경우, 회사는 사전 통보 없이 서비스
            이용 제한 및 회원 탈퇴 조치를 취할 수 있습니다.
          </p>
